name: Build Android APK
on:
  workflow_dispatch: # Allows you to manually trigger the build from your phone

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 5. Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: 6. Install Dependencies
        run: npm ci

      - name: 7. Build APK File
        run: npx eas-cli build --platform android --profile preview --local --output=./my-app.apk
        env:
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 8. Upload Completed APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: ./my-app.apk
